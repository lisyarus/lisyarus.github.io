		gl.texImage2D(gl.TEXTURE_2D, 0, gl.SRGB8_ALPHA8, textureSize, textureSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(pixels.buffer));
		gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
		gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
		gl.generateMipmap(gl.TEXTURE_2D);
	}

	createToolbarRemoveTexture() {
		let textureSize = this.toolbarItemSize;
		let pixels = new Uint32Array(textureSize * textureSize);
		for (let y = 0; y < textureSize; ++y) {
			for (let x = 0; x < textureSize; ++x) {
				let d = Math.min(
					Math.abs(x - y),
					Math.abs(x + y - (textureSize - 1)),
				);

				let s = Math.max(
					Math.abs(x - (textureSize-1) / 2),
					Math.abs(y - (textureSize-1) / 2),
				);

				let value = 0x00000000;

				if (d < 4 && s < textureSize * 0.3125) {
					value = 0xffffffff;
				}

				pixels[y * textureSize + x] = value;
			}
		}

		let gl = this.gl;
		this.toolbarRemoveTexture = gl.createTexture();
		gl.bindTexture(gl.TEXTURE_2D, this.toolbarRemoveTexture);
		gl.texImage2D(gl.TEXTURE_2D, 0, gl.SRGB8_ALPHA8, textureSize, textureSize, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array(pixels.buffer));
		gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
		gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
		gl.generateMipmap(gl.TEXTURE_2D);
	}

	loadPrimitives() {
		this.primitives = [];

		let processedVertexCount = 0;

		let primitivesData = document.getElementById("primitives").innerText;
		for (let line of primitivesData.split("\n")) {
			line = line.trim();
			if (line.length == 0) continue;
			if (line[0] == '#') continue;

			let tokens = line.split(' ');

			if (tokens[0] == 'o') {
				if (this.primitives.length > 0)
					processedVertexCount += this.primitives.at(-1).vertices.length;
				let name = tokens[1].replace('_', ' ');
				this.primitives.push(new Primitive(name));
			} else if (tokens[0] == 'v') {
				this.primitives.at(-1).vertices.push(new Vector(Number(tokens[1]), Number(tokens[2]), Number(tokens[3])));
			} else if (tokens[0] == 'f') {
				let currentPrimitive = this.primitives.at(-1);

				let face = [];
				for (let i = 1; i < tokens.length; ++i) {
					face.push(Number(tokens[i]) - processedVertexCount - 1);
				}

				currentPrimitive.faceVertices.push(face);
			}
		}

		// Restore primitive topology (vertex/edge/face connectivity)
		for (let primitive of this.primitives) {
			let edgeIndex = new Map();

			for (let v of primitive.vertices) {
				primitive.vertexFaces.push([]);
			}

			for (let k = 0; k < primitive.faceVertices.length; ++k) {
				let face = primitive.faceVertices[k];
				for (let i = 0; i < face.length; ++i) {
					primitive.vertexFaces[face[i]].push(k);

					let j = (i + 1) % face.length;

					let edge = [face[i], face[j]];
					let faceIndexInEdge = 0;
					if (edge[0] > edge[1]) {
						edge = [edge[1], edge[0]];
						faceIndexInEdge = 1;
					}

					let edgeKey = edge[0] + edge[1] * 256;
					if (!edgeIndex.has(edgeKey)) {
						edgeIndex.set(edgeKey, primitive.edgeVertices.length);
						primitive.edgeVertices.push([edge[0], edge[1]]);
						primitive.edgeFaces.push([null, null]);
					}
					primitive.edgeFaces[edgeIndex.get(edgeKey)][faceIndexInEdge] = k;
				}
			}

			// Find unique faces, i.e. faces with unique neighbourhoods
			let uniqueFaceKeys = new Map();
			for (let k = 0; k < primitive.faceVertices.length; ++k) {
				let face = primitive.faceVertices[k];

				let key = [];
				let min = Infinity;
				let max = -Infinity;
				for (let i = 0; i < face.length; ++i) {
					let j = (i + 1) % face.length;

					let edge = [face[i], face[j]];
					let faceIndexInEdge = 0;
					if (edge[0] > edge[1]) {
						edge = [edge[1], edge[0]];
						faceIndexInEdge = 1;
					}
					let edgeKey = edge[0] + edge[1] * 256;

					let otherFace = primitive.edgeFaces[edgeIndex.get(edgeKey)][1 - faceIndexInEdge];
					let value = primitive.faceVertices[otherFace].length;
					key.push(value);
					min = Math.min(min, value);
					max = Math.max(max, value);
				}

				if (min < max) {
					while (key[0] != min || key.at(-1) == min) {
						key = key.slice(1).concat(key.slice(0, 1));
					}
				}

				if (!uniqueFaceKeys.has(face.length)) {
					uniqueFaceKeys.set(face.length, [key]);
					primitive.uniqueFaces.set(face.length, [{index: k, noRotation: min == max}]);
				} else {
					let unique = true;
					for (let otherKey of uniqueFaceKeys.get(face.length)) {
						let equal = true;
						for (let i = 0; i < key.length; ++i) {
							if (key[i] != otherKey[i]) {
								equal = false;
								break;
							}
						}
						if (equal) {
							unique = false;
							break;
						}
					}

					if (unique) {
						uniqueFaceKeys.get(face.length).push(key);
						primitive.uniqueFaces.get(face.length).push({index: k, noRotation: min == max});
					}
				}
			}
		}


		let gl = this.gl;

		let primitiveScale = 1;

		// Center all primitives, compute bboxes, and generate meshes
		for (let primitive of this.primitives) {
			let primitiveCenter = new Vector(0, 0, 0);
			for (let vertex of primitive.vertices) {
				primitiveCenter = primitiveCenter.add(vertex);
			}
			primitiveCenter = primitiveCenter.mult(1 / primitive.vertices.length);
			for (let i in primitive.vertices) {
				primitive.vertices[i] = primitive.vertices[i].sub(primitiveCenter).mult(primitiveScale);
			}

			let radius = 0;
			for (let vertex of primitive.vertices) {
				primitive.bbox.extend(vertex);
				radius = Math.max(radius, vertex.length());
			}
			primitive.radius = radius;

			let meshVertices = [];
			let meshIndices = [];

			for (let face of primitive.faceVertices) {
				let faceCenter = new Vector(0, 0, 0);
				for (let vertex of face) {
					faceCenter = faceCenter.add(primitive.vertices[vertex]);
				}
				faceCenter = faceCenter.mult(1 / face.length);

				let relativeVertices = [];
				for (let vertex of face) {
					relativeVertices.push(primitive.vertices[vertex].sub(faceCenter));
				}

				let faceNormal = primitive.vertices[face[1]].sub(primitive.vertices[face[0]]).cross(primitive.vertices[face[2]].sub(primitive.vertices[face[0]])).normalized();

				primitive.faces.push(new PrimitiveFace(faceCenter, relativeVertices, faceNormal));

				let baseIndex = meshVertices.length;

				meshVertices.push(new PrimitiveMeshVertex(faceCenter, faceNormal, faceCenter.sub(primitive.vertices[face[0]].add(primitive.vertices[face[1]]).mult(0.5)).length()));
				for (let i = 0; i < face.length; ++i) {
					meshVertices.push(new PrimitiveMeshVertex(primitive.vertices[face[i]], faceNormal, 0));
				}

				for (let i = 0; i < face.length; ++i) {
					meshIndices.push(baseIndex);
					meshIndices.push(baseIndex + 1 + i);
					meshIndices.push(baseIndex + 1 + ((i + 1) % face.length));
				}
			}

			let meshVertexData = [];
			for (let vertex of meshVertices) {
				meshVertexData.push(vertex.position.coords[0]);
				meshVertexData.push(vertex.position.coords[1]);
				meshVertexData.push(vertex.position.coords[2]);
				meshVertexData.push(vertex.edge);
				meshVertexData.push(vertex.normal.coords[0]);
				meshVertexData.push(vertex.normal.coords[1]);
				meshVertexData.push(vertex.normal.coords[2]);
				meshVertexData.push(0);
			}

			let vertexArray = gl.createVertexArray();
			gl.bindVertexArray(vertexArray);
			let vertexBuffer = this.loadBuffer(new Float32Array(meshVertexData), gl.ARRAY_BUFFER);
			gl.enableVertexAttribArray(0);
			gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 32, 0);
			gl.enableVertexAttribArray(1);
			gl.vertexAttribPointer(1, 1, gl.FLOAT, false, 32, 12);
			gl.enableVertexAttribArray(2);
			gl.vertexAttribPointer(2, 3, gl.FLOAT, false, 32, 16);
			let indexBuffer = this.loadBuffer(new Int32Array(meshIndices), gl.ELEMENT_ARRAY_BUFFER);

			primitive.mesh = new Mesh(gl, vertexArray, vertexBuffer, indexBuffer, meshIndices.length);
		}

		// Sort primitives by vertex count
		// TODO: sort by volume
		this.primitives.sort((x, y) => x.vertices.length - y.vertices.length);
	}

	onResize() {
		super.onResize();
		this.player.camera.resize(this.canvas.width, this.canvas.height);

		if (this.canvas.width < 900) {
			if (this.toolbarItemSize != 32) {
				this.toolbarItemSize = 32;
				this.toolbarSelectionSize = 34;
				this.createToolbarItemTexture();
				this.createToolbarRemoveTexture();
				this.createToolbarSelectionTexture();
			}
		} else if (this.canvas.width < 1200) {
			if (this.toolbarItemSize != 48) {
				this.toolbarItemSize = 48;
				this.toolbarSelectionSize = 46;
				this.createToolbarItemTexture();
				this.createToolbarRemoveTexture();
				this.createToolbarSelectionTexture();
			}
		} else {
			if (this.toolbarItemSize != 64) {
				this.toolbarItemSize = 64;
				this.toolbarSelectionSize = 68;
				this.createToolbarItemTexture();
				this.createToolbarRemoveTexture();
				this.createToolbarSelectionTexture();
			}
		}
	}

	onMouseDown(event) {
		super.onMouseDown(event);

		let needSaveInstances = false;

		if (event.button == 0 && this.locked) {
			let selection = this.toolbar[this.selectedToolbarIndex];

			if ((selection instanceof Primitive) && this.placementPosition) {
				if (this.placementIsValid) {
					this.instances.push(new PrimitiveInstance(selection, this.placementPosition, this.placementRotation));
					needSaveInstances = true;
				} else {
					this.placementGhostScaleVelocity -= 20;
				}
			}

			if (selection == "remove" && this.removalInstance) {
				let index = this.instances.indexOf(this.removalInstance);
				if (index >= 0) {
					this.instances.splice(index, 1);
					this.destroyingInstances.push(this.removalInstance);
					this.removalInstance.destroyedAt = new Date();
					needSaveInstances = true;
				}
			}
		}

		if (event.button == 1 && this.locked) {
			if (this.intersectionInstance) {
				for (let i = 0; i < this.toolbar.length; ++i) {
					if (this.toolbar[i] == this.intersectionInstance.primitive) {
						this.selectedToolbarIndex = i;
						break;
					}
				}
			}
		}

		if (needSaveInstances)
			this.saveInstances();
	}

	onMouseWheel(event) {
		super.onMouseWheel(event);

		if (this.locked) {
			if (event.deltaY < 0) {
				this.moveToolbarSelection(this.selectedToolbarIndex - 1);
			}
			if (event.deltaY > 0) {
				this.moveToolbarSelection(this.selectedToolbarIndex + 1);
			}
		}
	}

	onKeyDown(event) {
		super.onKeyDown(event);

		if (this.locked) {
			if (event.code.startsWith('Digit')) {
				let index = Number(event.code[5]) - 1;
				this.moveToolbarSelection(index >= 0 ? index : 9);
			}
			if (event.code == 'KeyX') {
				this.moveToolbarSelection(this.toolbar.length - 1);
			}
			if (event.code == 'KeyR') {
				let selection = this.toolbar[this.selectedToolbarIndex];
				if (this.attachmentType != 0 && selection instanceof Primitive && selection.uniqueFaces.has(this.attachmentType)) {
					let uniqueFaces = selection.uniqueFaces.get(this.attachmentType);
					if (!this.attachmentTypeSettings[this.selectedToolbarIndex].has(this.attachmentType)) {
						this.attachmentTypeSettings[this.selectedToolbarIndex].set(this.attachmentType, {face: 0, rotation: 0});
					}

					let settings = this.attachmentTypeSettings[this.selectedToolbarIndex].get(this.attachmentType);
					settings.rotation += 1;
					if (settings.rotation >= this.attachmentType || uniqueFaces[settings.face].noRotation) {
						settings.rotation = 0;
						settings.face += 1;
						if (settings.face >= uniqueFaces.length) {
							settings.face = 0;
						}
					}
				}
			}
		}
	}

	moveToolbarSelection(value) {
		this.selectedToolbarIndex = value;
		if (this.selectedToolbarIndex < 0)
			this.selectedToolbarIndex += this.toolbar.length;
		if (this.selectedToolbarIndex >= this.toolbar.length)
			this.selectedToolbarIndex -= this.toolbar.length;
	}

	onMouseMove(event) {
		if (this.locked) {
			let delta = new Vector(event.movementX || (event.clientX - this.mouse.coords[0]), event.movementY || (event.clientY - this.mouse.coords[1]));
			this.player.rotateX(- delta.coords[0] / 400.0);
			this.player.rotateY(- delta.coords[1] / 400.0);
		}
	}

	update(dt) {
		let movement = [0, 0, 0];
		let jetpack = false;

		if (this.locked) {
			if (this.keyDown.has('KeyW')) movement[0] += 1;
			if (this.keyDown.has('KeyS')) movement[0] -= 1;
			if (this.keyDown.has('KeyD')) movement[1] += 1;
			if (this.keyDown.has('KeyA')) movement[1] -= 1;
			if (this.keyDown.has('ShiftLeft')) movement[2] = 1;
			if (this.keyDown.has('KeyC')) movement[2] = -1;
			if (this.keyDown.has('Space')) this.player.jump(movement[2]);
			if (this.keyDown.has('KeyF')) jetpack = true;

			if (movement[2] == 1) {
				this.player.fovYTarget = Math.PI * 0.7;
			} else {
				this.player.fovYTarget = Math.PI * 0.5;
			}
		}
		if (jetpack) {
			this.player.jetpack(movement[0], movement[1], dt);
		} else {
			this.player.move(movement[0], movement[1], movement[2], dt);
			this.player.crouch(movement[2]);
		}
		this.player.update(dt, this.instances);

		this.placementPosition = null;
		this.placementRotation = null;
		this.placementIsGround = false;
		this.placementIsValid = false;
		this.intersectionInstance = null;
		this.removalInstance = null;
		this.attachmentType = 0;
		if (this.locked) {
			let cameraRay = this.player.camera.forwardRay();
			let closestIntersection = Infinity;
			let intersectionFace = null;

			for (let instance of this.instances) {
				for (let face of instance.primitive.faces) {
					let p0 = instance.position.add(instance.rotation.rotate(face.center));
					for (let i = 0; i < face.vertices.length; ++i) {
						let p1 = p0.add(instance.rotation.rotate(face.vertices[i]));
						let p2 = p0.add(instance.rotation.rotate(face.vertices[(i + 1) % face.vertices.length]));
						let intersection = cameraRay.intersectTriangle(p0, p1, p2);
						if (intersection != null && intersection < closestIntersection) {
							closestIntersection = intersection;
							this.intersectionInstance = instance;
							intersectionFace = face;
							break;
						}
					}
				}
			}

			let selection = this.toolbar[this.selectedToolbarIndex];

			if (selection instanceof Primitive) {
				if (this.intersectionInstance) {
					this.attachmentType = intersectionFace.vertices.length;
					if (!this.attachmentTypeSettings[this.selectedToolbarIndex].has(this.attachmentType)) {
						this.attachmentTypeSettings[this.selectedToolbarIndex].set(this.attachmentType, {face: 0, rotation: 0});
					}
					let attachmentSettings = this.attachmentTypeSettings[this.selectedToolbarIndex].get(this.attachmentType);

					let attachmentFace = null;
					if (selection.uniqueFaces.has(this.attachmentType)) {
						attachmentFace = selection.faces[selection.uniqueFaces.get(this.attachmentType)[attachmentSettings.face].index];
						this.placementIsValid = true;
					} else {
						attachmentFace = selection.faces[0];

					}

					let targetNormal = this.intersectionInstance.rotation.rotate(intersectionFace.normal.mult(-1));
					this.placementRotation = Quaternion.fromTo(attachmentFace.normal, targetNormal);

					let targetTangent = this.intersectionInstance.rotation.rotate(intersectionFace.vertices[0]).normalized();
					let currentTangent = this.placementRotation.rotate(attachmentFace.vertices[attachmentSettings.rotation]).normalized();
					this.placementRotation = Quaternion.fromTo(currentTangent, targetTangent, targetNormal).mult(this.placementRotation);

					this.placementPosition = this.intersectionInstance.position.add(this.intersectionInstance.rotation.rotate(intersectionFace.center)).sub(this.placementRotation.rotate(attachmentFace.center));
				}

				let groundIntersection = cameraRay.intersectPlane(new Vector(0, 0, 1), 0);
				if (groundIntersection != null && groundIntersection < closestIntersection) {
					closestIntersection = groundIntersection;
					this.placementPosition = cameraRay.get(groundIntersection).add(new Vector(0, 0, - selection.bbox.min.coords[2]));
					this.placementRotation = Quaternion.axisAngle(new Vector(0, 0, 1), this.player.camera.xAngle);
					this.placementIsGround = true;
					this.placementIsValid = true;
					this.intersectionInstance = null;
				}
			} else if (selection == "remove") {
				this.removalInstance = this.intersectionInstance;
			}
		}

		this.placementGhostScaleVelocity -= (400.0 * (this.placementGhostScale - 1) + 40.0 * this.placementGhostScaleVelocity) * dt;
		this.placementGhostScale += dt * this.placementGhostScaleVelocity;

		this.selectedToolbarIndexSmooth += (this.selectedToolbarIndex - this.selectedToolbarIndexSmooth) * (- Math.expm1(- 25 * dt));

		this.toolbarRotation[this.selectedToolbarIndex] += 2 * dt;

		let now = new Date();

		let newDestroyingInstances = [];
		for (let instance of this.destroyingInstances) {
			if (now - instance.destroyedAt < 125) {
				newDestroyingInstances.push(instance);
			}
		}
		this.destroyingInstances = newDestroyingInstances;

		window.localStorage.setItem("player", JSON.stringify(this.player.save()));
	}

	draw () {
		let gl = this.gl;
		gl.viewport(0, 0, this.canvas.width, this.canvas.height);

		gl.clearColor(0, 0, 0, 0);
		gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

		let cameraViewMatrix = this.player.camera.viewMatrix();
		let cameraProjectionMatrix = this.player.camera.projectionMatrix();
		let cameraMatrix = cameraProjectionMatrix.mult(cameraViewMatrix);
		let inverseCameraMatrix = cameraMatrix.inverse();

		gl.disable(gl.DEPTH_TEST);

		gl.useProgram(this.skyProgram);
		this.skyProgram.inverseCameraMatrix = inverseCameraMatrix;
		this.skyProgram.cameraPosition = this.player.camera.position;
		gl.enableVertexAttribArray(0);
		gl.drawArrays(gl.TRIANGLES, 0, 3);

		gl.enable(gl.DEPTH_TEST);
		gl.depthFunc(gl.LESS);
		gl.disable(gl.CULL_FACE);
		gl.disable(gl.BLEND);

		gl.useProgram(this.groundProgram);
		this.groundProgram.cameraMatrix = cameraMatrix;
		gl.bindTexture(gl.TEXTURE_2D, this.gridTexture);
		this.groundMesh.draw();

		gl.bindTexture(gl.TEXTURE_2D, this.edgeTexture);

		gl.disable(gl.CULL_FACE);
		gl.cullFace(gl.BACK);
		gl.useProgram(this.primitiveProgram);
		this.primitiveProgram.cameraMatrix = cameraMatrix;

		let now = new Date();

		for (let instance of this.instances) {
			let time = (now - instance.createdAt) / 1000.0;
			let animationTime = 0.125;
			let animationAmplitude = -1;
			let scale = 1;
			if (time < animationTime) {
				let t = time / animationTime;
				scale = animationAmplitude * t * (t - 1) * (t - 1) + 1;
			}

			this.primitiveProgram.instanceOffset = instance.position;
			this.primitiveProgram.instanceScale = scale;
			this.primitiveProgram.instanceRotation = instance.rotation;
			this.primitiveProgram.albedo = new Vector(1, 1, 1, 1);
			this.primitiveProgram.edgeAlbedo = new Vector(0, 0, 0, 1);
			this.primitiveProgram.emission = new Vector(0, 0, 0, 0);
			this.primitiveProgram.edgeEmission = new Vector(0, 0, 0, 0);
			instance.primitive.mesh.draw();
		}

		for (let instance of this.destroyingInstances) {
			let time = (now - instance.destroyedAt) / 1000.0;
			let animationTime = 0.125;
			let animationAmplitude = 2;
			let scale = 0;
			if (time < animationTime) {
				let t = time / animationTime;
				scale = animationAmplitude * (2 * t * t * t - 4 * t * t + 2 * t) + (1 - t);
			}

			this.primitiveProgram.instanceOffset = instance.position;
			this.primitiveProgram.instanceScale = scale;
			this.primitiveProgram.instanceRotation = instance.rotation;
			this.primitiveProgram.albedo = new Vector(1, 1, 1, 1);
			this.primitiveProgram.edgeAlbedo = new Vector(0, 0, 0, 1);
			this.primitiveProgram.emission = new Vector(0, 0, 0, 0);
			this.primitiveProgram.edgeEmission = new Vector(0, 0, 0, 0);
			instance.primitive.mesh.draw();
		}

		gl.enable(gl.BLEND);
		gl.blendEquation(gl.FUNC_ADD);
		gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

		let selection = this.toolbar[this.selectedToolbarIndex];
		if ((this.placementPosition && selection instanceof Primitive) || this.removalInstance) {
			let primitive;
			if (this.placementPosition) {
				this.primitiveProgram.instanceOffset = this.placementPosition;
				this.primitiveProgram.instanceRotation = this.placementRotation;
				this.primitiveProgram.instanceScale = 0.99 * this.placementGhostScale;
				primitive = selection;
			}

			if (this.removalInstance) {
				this.primitiveProgram.instanceOffset = this.removalInstance.position;
				this.primitiveProgram.instanceRotation = this.removalInstance.rotation;
				this.primitiveProgram.instanceScale = 1.01;
				primitive = this.removalInstance.primitive;
			}

			gl.enable(gl.CULL_FACE);
			gl.depthMask(false);

			gl.depthFunc(gl.GEQUAL);

			this.primitiveProgram.albedo = new Vector(0, 0, 0, 0);
			this.primitiveProgram.edgeAlbedo = new Vector(0, 0, 0, 0);
			if (this.placementIsGround) {
				this.primitiveProgram.emission = new Vector(0.1, 0.4, 0.1, 1 / 256);
				this.primitiveProgram.edgeEmission = new Vector(0.6, 0.8, 0.6, 1 / 256);
			} else if (this.placementIsValid) {
				this.primitiveProgram.emission = new Vector(0.1, 0.2, 0.4, 1 / 256);
				this.primitiveProgram.edgeEmission = new Vector(0.6, 0.7, 0.8, 1 / 256);
			} else if (this.removalInstance) {
				this.primitiveProgram.emission = new Vector(0.4, 0.1, 0.1, 1 / 256);
				this.primitiveProgram.edgeEmission = new Vector(0.8, 0.6, 0.6, 1 / 256);
			} else {
				this.primitiveProgram.emission = new Vector(0.4, 0.1, 0.1, 1 / 256);
				this.primitiveProgram.edgeEmission = new Vector(0.8, 0.6, 0.6, 1 / 256);
			}

			gl.cullFace(gl.FRONT);
			primitive.mesh.draw();
			gl.cullFace(gl.BACK);
			primitive.mesh.draw();

			gl.depthFunc(gl.LESS);

			this.primitiveProgram.albedo = new Vector(0, 0, 0, 1 / 4);
			this.primitiveProgram.edgeAlbedo = new Vector(0, 0, 0, 1 / 4);
			if (this.placementIsGround) {
				this.primitiveProgram.emission = new Vector(0.1, 0.4, 0.1, 1 / 16);
				this.primitiveProgram.edgeEmission = new Vector(0.6, 0.8, 0.6, 1 / 4);
			} else if (this.placementIsValid) {
				this.primitiveProgram.emission = new Vector(0.1, 0.2, 0.4, 1 / 16);
				this.primitiveProgram.edgeEmission = new Vector(0.6, 0.7, 0.8, 1 / 4);
			} else if (this.removalInstance) {
				this.primitiveProgram.emission = new Vector(0.4, 0.0, 0.0, 1 / 16);
				this.primitiveProgram.edgeEmission = new Vector(0.8, 0.6, 0.6, 1 / 4);
			} else {
				this.primitiveProgram.emission = new Vector(0.4, 0.1, 0.1, 1 / 16);
				this.primitiveProgram.edgeEmission = new Vector(0.8, 0.6, 0.6, 1 / 4);
			}

			gl.cullFace(gl.FRONT);
			primitive.mesh.draw();
			gl.cullFace(gl.BACK);
			primitive.mesh.draw();

			gl.depthMask(true);
		}

		gl.disable(gl.DEPTH_TEST);

		gl.useProgram(this.imageProgram);

		if (this.locked) {
			this.imageProgram.imageCenter = new Vector(0, 0);
			this.imageProgram.imageSize = new Vector(this.crosshairSize / this.canvas.width, this.crosshairSize / this.canvas.height);
			this.imageProgram.imageColor = new Vector(1, 1, 1, 1);
			gl.bindTexture(gl.TEXTURE_2D, this.crosshairTexture);
			gl.drawArrays(gl.TRIANGLES, 0, 6);
		}

		let toolbarItemStep = this.toolbarItemSize - 1;
		let toolbarCenterY = this.canvas.height - 1 * this.toolbarItemSize;
		let toolbarLeft = Math.floor(this.canvas.width / 2 - this.toolbar.length * toolbarItemStep / 2);
		let imageSize = new Vector(this.toolbarItemSize / this.canvas.width, this.toolbarItemSize / this.canvas.height);
		this.imageProgram.imageCenter = new Vector(0, 0);
		this.imageProgram.imageSize = imageSize;
		this.imageProgram.imageColor = new Vector(1, 1, 1, 1);
		gl.bindTexture(gl.TEXTURE_2D, this.toolbarItemTexture);
		for (let i = 0; i < this.toolbar.length; ++i) {
			let x = toolbarLeft + i * toolbarItemStep + 0.5 * this.toolbarItemSize;
			this.imageProgram.imageCenter = new Vector(2 * x / this.canvas.width - 1, 1 - 2 * toolbarCenterY / this.canvas.height);
			gl.drawArrays(gl.TRIANGLES, 0, 6);

			if (this.toolbar[i] == "remove") {
				gl.bindTexture(gl.TEXTURE_2D, this.toolbarRemoveTexture);
				if (this.selectedToolbarIndex == i) {
					this.imageProgram.imageColor = new Vector(1, 0.5, 0.25, 1);
				}
				gl.drawArrays(gl.TRIANGLES, 0, 6);
				if (this.selectedToolbarIndex == i) {
					this.imageProgram.imageColor = new Vector(1, 1, 1, 1);
				}
				gl.bindTexture(gl.TEXTURE_2D, this.toolbarItemTexture);
			}
		}

		{
			let x = toolbarLeft + this.selectedToolbarIndexSmooth * toolbarItemStep + 0.5 * this.toolbarItemSize;
			this.imageProgram.imageColor = new Vector(1, 0.5, 0.25, 1);
			this.imageProgram.imageSize = new Vector(this.toolbarSelectionSize / this.canvas.width, this.toolbarSelectionSize / this.canvas.height);
			this.imageProgram.imageCenter = new Vector(2 * x / this.canvas.width - 1, 1 - 2 * toolbarCenterY / this.canvas.height);
			gl.bindTexture(gl.TEXTURE_2D, this.toolbarSelectionTexture);
			gl.drawArrays(gl.TRIANGLES, 0, 6);
		}

		gl.clear(gl.DEPTH_BUFFER_BIT);
		gl.enable(gl.DEPTH_TEST);
		gl.disable(gl.CULL_FACE);
		gl.bindTexture(gl.TEXTURE_2D, this.thickEdgeTexture);

		gl.useProgram(this.primitiveProgram);
		this.primitiveProgram.albedo = new Vector(1, 1, 1, 1);
		this.primitiveProgram.edgeAlbedo = new Vector(0, 0, 0, 1);
		this.primitiveProgram.emission = new Vector(0, 0, 0, 0);
		this.primitiveProgram.edgeEmission = new Vector(0, 0, 0, 0);

		let toolbarPreviewCameraWidth = this.canvas.width / toolbarItemStep;
		this.primitiveProgram.cameraMatrix = Matrix.identity(4)
			.mult(Matrix.translation(new Vector(0, 1 - toolbarCenterY / (this.canvas.height / 2), 0)))
			.mult(Matrix.scaling(new Vector(2 / toolbarPreviewCameraWidth, 2 * this.aspectRatio / toolbarPreviewCameraWidth, 2 * this.aspectRatio / toolbarPreviewCameraWidth)))
			.mult(Matrix.rotationXY(Math.PI/2.0))
			.mult(Matrix.rotationZX(Math.PI/2.0))
			.mult(Matrix.rotationZX(Math.PI/6.0))
			;

		for (let i = 0; i < this.toolbar.length; ++i) {
			let primitive = this.toolbar[i];
			if (!(primitive instanceof Primitive)) continue;

			if (i == this.selectedToolbarIndex)
				this.primitiveProgram.albedo = new Vector(1, 0.5, 0.25, 1);

			let x = - this.toolbar.length * 0.5 + i + 0.5;

			this.primitiveProgram.instanceOffset = new Vector(0, -x, 0);
			this.primitiveProgram.instanceScale = 0.4 / (primitive.radius);
			this.primitiveProgram.instanceRotation = Quaternion.axisAngle(new Vector(0, 0, 1), this.toolbarRotation[i]);
			primitive.mesh.draw();

			if (i == this.selectedToolbarIndex)
				this.primitiveProgram.albedo = new Vector(1, 1, 1, 1);
		}
	}
}

var frame;
var lastUpdateTime = new Date();
var infoPanelOpacity = 1;

function update() {
	let now = new Date();
	let dt = (now - lastUpdateTime) * 0.001;
	lastUpdateTime = now;

	frame.processInputs();
	frame.update(dt);
	frame.draw();

	infoPanelOpacity += ((frame.locked ? 0 : 1) - infoPanelOpacity) * (- Math.expm1(- 10 * dt));

	let infoPanel = document.getElementById("infoPanel");
	infoPanel.style.opacity = infoPanelOpacity;

	let clickPanel = document.getElementById("clickPanel");
	clickPanel.style.opacity = infoPanelOpacity;

	requestAnimationFrame(update);
}

function init() {
	let canvas = document.getElementById("mainCanvas");
	frame = new PolyhedraFrame(canvas);
	frame.onResize();

	window.addEventListener('resize', () => {
		frame.onResize();
	});

	document.addEventListener('pointerlockchange', () => {
		if (document.pointerLockElement == canvas) {
			frame.locked = true;
		} else {
			frame.locked = false;
		}
	});

	canvas.addEventListener('click', () => {
  		canvas.requestPointerLock();
	});

	update();
}

function resetPlayer() {
	window.localStorage.removeItem("player");
	frame.player = new Player();
	frame.player.camera.aspectRatio = frame.aspectRatio;
}

var clearSceneCount = 0;
function clearScene() {
	let button = document.getElementById("clearSceneButton");

	clearSceneCount += 1;
	if (clearSceneCount == 1) {
		button.innerText = "Click again to\ndelete your scene";
		button.style.backgroundColor = "#7f3f3f";
	} else if (clearSceneCount >= 2) {
		clearSceneCount = 0;
		window.localStorage.removeItem("instances");
		frame.instances = [];
		button.innerText = "Clear scene";
		button.style.backgroundColor = "";
	}
}
</script>
